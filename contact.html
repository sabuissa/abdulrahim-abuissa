                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <h2>Get in Touch</h2>
            <p>[ONE LINE — what people should reach out for. e.g. "For coaching, partnerships, or speaking opportunities."]</p>

            <form class="contact-form" action="https://oim.zhili.dev/echo/view" method="POST">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit" class="btn">Send Message</button>
            </form>

            <div class="contact-info">
                <p>Email: [his email — confirm]</p>
                <p>Instagram: [his handle — confirm]</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Abdulrahim Abuissa</p>
    </footer>
